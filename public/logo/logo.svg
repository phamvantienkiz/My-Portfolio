<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 56" width="130" height="56">
  <defs>
    <!-- Nhúng font chữ viết tay cách điệu từ Google Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pacifico&amp;display=swap');
      .logo-text {
        font-family: 'Pacifico', cursive;
        font-size: 26px;
        fill: url(#textGrad);
        filter: url(#dropShadow);
      }
    </style>
    
    <!-- Gradient trắng sang Cyan -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#55d5f0" />
    </linearGradient>

    <!-- Đổ bóng mờ nhẹ màu xanh dương hệ thống -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#0066ff" flood-opacity="0.75"/>
    </filter>
    
    <!-- Hiệu ứng phát sáng dạ quang cho nét gạch chân -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Nền tối (xóa dòng này nếu muốn nền trong suốt) -->
  <rect width="130" height="56" fill="#0d1117" rx="8" />

  <!-- Chữ vantien -->
  <text x="65" y="34" text-anchor="middle" class="logo-text">vantien</text>

  <!-- Nét gạch chân nghệ thuật uốn lượn -->
  <path d="M 22 45 C 45 53, 85 39, 108 47" 
        fill="none" 
        stroke="#55d5f0" 
        stroke-width="2" 
        stroke-linecap="round"
        filter="url(#neonGlow)" />
</svg>
